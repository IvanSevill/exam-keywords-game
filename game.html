<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Recall - Game</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/game.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-header">
        <div class="app-container" style="padding-top: 0; padding-bottom: 0;">
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="header-main-row">
                <div class="difficulty-info">
                    <span id="difficulty-badge" class="badge"></span>
                    <span id="question-counter" class="q-counter-text" style="margin-left: 1rem; opacity: 0.7;"></span>
                </div>
                <div class="game-actions">
                    <button id="showAnswerBtn" class="btn secondary-btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;" data-i18n="show_ans_btn">Show Answer</button>
                    <button id="nextQuestionBtn" class="btn primary-btn" disabled style="padding: 0.5rem 1rem; font-size: 0.9rem;" data-i18n="next_btn_locked">Next</button>
                    <button id="exitTestBtn" class="btn danger-btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;" data-i18n="exit_test_btn">Exit</button>
                </div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div class="card mb-6">
            <h2 id="question-text" style="font-size: 1.5rem; text-align: center;"></h2>
        </div>

        <div class="game-body-layout">
            <aside class="game-input-sidebar">
                <div id="hard-mode-input-container" class="hidden">
                    <input type="text" id="hard-mode-input" class="custom-textarea" style="text-align: center; font-size: 1.2rem;" placeholder="Type keyword..." autocomplete="off">
                </div>

                <div id="normal-answer-section">
                    <label data-i18n="answer_label" class="mt-2" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Your Answer:</label>
                    <textarea id="user-answer" rows="10" class="custom-textarea" data-i18n-placeholder="answer_placeholder"></textarea>
                </div>

                <div class="keywords-panel mt-6">
                    <h3 style="font-size: 1rem; margin-bottom: 0.5rem;"><span data-i18n="keywords_label">Keywords:</span> <span id="keywords-found-count">0</span>/<span id="keywords-total-count">0</span></h3>
                    <div id="keywords-container" class="keywords-grid"></div>
                </div>
            </aside>

            <main class="game-text-display">
                <div id="learning-cloze-container" class="cloze-panel"></div>
            </main>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/core.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
