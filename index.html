<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Recall - Home</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/game.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-controls">
        <button id="helpBtn" class="btn secondary-btn" style="padding: 0.5rem 0.8rem;">❔</button>
        <button id="langToggleBtn" class="btn secondary-btn" style="padding: 0.5rem 0.8rem;">🇹🇷</button>
        <button id="themeToggleBtn" class="btn secondary-btn" style="padding: 0.5rem 0.8rem;">🌙</button>
    </div>

    <!-- Tutorial Modal -->
    <div id="tutorial-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 data-i18n="tut_title">Welcome!</h2>
            <p data-i18n="tut_p1" class="mt-2">Practice your exam answers effectively.</p>
            <div class="tut-section mt-4">
                <ul style="list-style: none; display: flex; flex-direction: column; gap: 0.5rem;">
                    <li><strong data-i18n="tut_mode_norm_title">Normal:</strong> <span data-i18n="tut_mode_norm_desc">Full typing.</span></li>
                    <li><strong data-i18n="tut_mode_learn_title">Learning:</strong> <span data-i18n="tut_mode_learn_desc">Hints every 3s.</span></li>
                    <li><strong data-i18n="tut_mode_hard_title">Fast:</strong> <span data-i18n="tut_mode_hard_desc">Exact keywords.</span></li>
                </ul>
            </div>
            <button id="closeTutorialBtn" class="btn primary-btn full-width mt-6" data-i18n="tut_btn">Got it!</button>
        </div>
    </div>

    <div class="app-container">
        <header>
            <h1><span class="highlight-text">Active Recall</span> Game</h1>
            <p data-i18n="header_subtitle">Study smarter, not harder.</p>
        </header>

        <section id="setup-section" class="card fade-in" style="max-width: 600px; margin: 0 auto;">
            <div id="file-status" class="status-text" style="text-align: center; margin-bottom: 1.5rem;">
                <span data-i18n="status_searching">Loading data...</span>
            </div>

            <div id="difficulty-selector-wrapper" class="hidden">
                <label class="label-block mb-2" data-i18n="diff_label">Select Game Mode:</label>
                <div class="difficulty-options">
                    <label class="diff-radio">
                        <input type="radio" name="difficulty" value="normal" checked>
                        <div class="diff-card">
                            <h3 data-i18n="diff_norm_title">Normal</h3>
                            <p data-i18n="diff_norm_desc">Full answer detection.</p>
                        </div>
                    </label>
                    <label class="diff-radio">
                        <input type="radio" name="difficulty" value="learning">
                        <div class="diff-card">
                            <h3 data-i18n="diff_learn_title">Learning</h3>
                            <p data-i18n="diff_learn_desc">Auto-hints enabled.</p>
                        </div>
                    </label>
                    <label class="diff-radio">
                        <input type="radio" name="difficulty" value="hard">
                        <div class="diff-card">
                            <h3 data-i18n="diff_hard_title">Fast</h3>
                            <p data-i18n="diff_hard_desc">Direct keyword entry.</p>
                        </div>
                    </label>
                    <label class="diff-radio">
                        <input type="radio" name="difficulty" value="explore">
                        <div class="diff-card">
                            <h3 data-i18n="explore_title">Explorer</h3>
                            <p data-i18n="explore_desc">Browse & study.</p>
                        </div>
                    </label>
                </div>
                <button id="startBtn" class="btn primary-btn mt-6 full-width" style="padding: 1.2rem; font-size: 1.2rem;" data-i18n="start_btn">Start Session</button>
            </div>

            <!-- History Collapsible -->
            <div id="history-collapsible" class="history-card mt-6">
                <button id="toggleHistoryBtn" class="history-toggle-btn">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <span class="history-icon-circle">📜</span>
                        <span data-i18n="history_title">History</span>
                    </div>
                    <span id="history-arrow" class="arrow-icon">▼</span>
                </button>
                <div id="history-content" class="history-expandable">
                    <div id="history-container" class="history-list scrollbar-hidden"></div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/core.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const statusEl = document.getElementById('file-status');
            try {
                const data = await loadCSVData();
                if (data && data.length > 0) {
                    statusEl.classList.add('hidden');
                    document.getElementById('difficulty-selector-wrapper').classList.remove('hidden');
                    console.log("App ready with", data.length, "questions.");
                } else {
                    statusEl.innerHTML = translations[currentLang].status_error;
                }
            } catch (e) {
                console.error("Initialization failed:", e);
                statusEl.innerHTML = "Error: " + e.message;
            }
            
            loadHistory();
            
            const toggleBtn = document.getElementById('toggleHistoryBtn');
            const historyCard = document.getElementById('history-collapsible');
            if (toggleBtn) {
                toggleBtn.onclick = () => historyCard.classList.toggle('expanded');
            }

            const helpBtn = document.getElementById('helpBtn');
            const tutModal = document.getElementById('tutorial-modal');
            if (helpBtn) helpBtn.onclick = () => tutModal.classList.remove('hidden');
            document.getElementById('closeTutorialBtn').onclick = () => tutModal.classList.add('hidden');

            document.getElementById('startBtn').onclick = () => {
                const mode = document.querySelector('input[name="difficulty"]:checked').value;
                if (mode === 'explore') {
                    window.location.href = 'explorer.html';
                } else {
                    window.location.href = `game.html?mode=${mode}`;
                }
            };
        });
    </script>
</body>
</html>
